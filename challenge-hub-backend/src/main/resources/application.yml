spring:
  application:
    name: challenge-hub-backend
  profiles:
    active: dev
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

server:
  port: ${APP_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
    cookie-name: ${JWT_COOKIE_NAME:ch_refresh_token}
    cookie-same-site: ${JWT_COOKIE_SAMESITE:Lax}
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    cookie-path: ${JWT_COOKIE_PATH:/api/v1/auth}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  rate-limit:
    public-per-minute: ${RATE_LIMIT_PUBLIC:100}
    authenticated-per-minute: ${RATE_LIMIT_AUTH:300}
    login-per-minute: ${RATE_LIMIT_LOGIN:10}
    register-per-minute: ${RATE_LIMIT_REGISTER:5}
    upload-url-per-minute: ${RATE_LIMIT_UPLOAD_URL:10}
    messaging-send-per-minute: ${RATE_LIMIT_MESSAGING_SEND:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info
