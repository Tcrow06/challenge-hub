spring:
  application:
    name: challenge-hub-backend
  profiles:
    active: dev

server:
  port: ${APP_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
    cookie-name: ${JWT_COOKIE_NAME:ch_refresh_token}
    cookie-same-site: ${JWT_COOKIE_SAMESITE:Lax}
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    cookie-path: ${JWT_COOKIE_PATH:/api/v1/auth}

management:
  endpoints:
    web:
      exposure:
        include: health,info
