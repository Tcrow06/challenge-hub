spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/challengehub}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:password123}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/challengehub}
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}

logging:
  level:
    org.springframework.security: INFO
    com.challengehub: DEBUG

media:
  provider: ${MEDIA_PROVIDER:minio}
  s3:
    endpoint: ${STORAGE_S3_ENDPOINT:http://localhost:9000}
    access-key: ${STORAGE_S3_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_S3_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_S3_BUCKET:challenge-assets}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}

springdoc: # API Documentation Configuration
  api-docs:
    path: /api-docs
    enabled: true # Enable or disable the generation of API docs
  swagger-ui:
    path: /swagger-ui
    enabled: true # Enable or disable the Swagger UI
