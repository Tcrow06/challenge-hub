version: '3.8'

services:
  backend:
    build:
      context: ./challenge-hub-backend
      dockerfile: Dockerfile
    container_name: ch-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '8080:8080'
    depends_on:
      - postgres
      - mongodb
      - redis
      - minio
    networks:
      - ch-network

  frontend:
    build:
      context: ./challenge-hub-frontend
      dockerfile: Dockerfile
    container_name: ch-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '5173:5173'
    networks:
      - ch-network

  postgres:
    image: postgres:15-alpine
    container_name: ch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-challengehub}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ch-network

  mongodb:
    image: mongo:6.0
    container_name: ch-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodata:/data/db
    networks:
      - ch-network

  redis:
    image: redis:7-alpine
    container_name: ch-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - ch-network

  minio:
    image: minio/minio
    container_name: ch-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ':9001'
    volumes:
      - miniodata:/data
    networks:
      - ch-network

  nginx:
    image: nginx:alpine
    container_name: ch-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    networks:
      - ch-network

volumes:
  pgdata:
  mongodata:
  miniodata:

networks:
  ch-network:
    driver: bridge
